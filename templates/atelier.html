<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Précipitations Lille</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: #f5f7fa; }
    h1 { color: #302b63; }
    #chart { width: 100%; height: 520px; }
    #status { margin-top: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>Précipitations horaires — Lille</h1>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    let cachedRows = null;

    async function init() {
      try {
        const rows = await fetchData();
        cachedRows = rows;
        drawChart(rows);
        window.addEventListener('resize', () => { if (cachedRows) drawChart(cachedRows); });
      } catch (err) {
        document.getElementById('status').textContent = "Erreur: " + err.message;
      }
    }

    async function fetchData() {
      const res = await fetch('/lille', { headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      return json.map(p => {
        const [datePart, timePart] = p.datetime.split('T');
        const [y, m, d] = datePart.split('-').map(Number);
        const [hh, mm] = timePart.split(':').map(Number);
        return [new Date(y, m - 1, d, hh, mm), Number(p.precipitation_mm)];
      });
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Date/Heure');
      data.addColumn('number', 'Précipitations (mm)');
      data.addRows(rows);

      const options = {
        title: 'Précipitations à Lille (7 jours)',
        legend: { position: 'bottom' },
        hAxis: { title: 'Date/Heure', format: 'dd/MM HH:mm' },
        vAxis: { title: 'mm', minValue: 0 },
        colors: ['#4a90d9'],
        areaOpacity: 0.4,
        explorer: { actions: ['dragToZoom', 'rightClickToReset'] }
      };

      const chart = new google.visualization.AreaChart(document.getElementById('chart'));
      chart.draw(data, options);
      document.getElementById('status').textContent = `OK — ${rows.length} points chargés`;
    }
  </script>
</body>
</html>
